<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Spinner -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading CodeTrack...</p>
  </div>

  <!-- Auth View -->
  <div id="auth-view" class="hidden">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <div class="logo">&lt;/&gt;</div>
          <h1>CodeTrack</h1>
          <p>Engineering Lab &bull; Progress Tracker</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter your username" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
          <p class="auth-switch">Don't have an account? <a href="#" onclick="toggleAuthForm(event)">Register</a></p>
          <div style="border-top:1px solid var(--border);margin-top:20px;padding-top:16px;text-align:center">
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">Preview mode (no Firebase needed)</p>
            <div style="display:flex;gap:8px">
              <button type="button" class="btn btn-outline btn-full" onclick="startPreview('teacher')">Preview as Teacher</button>
              <button type="button" class="btn btn-outline btn-full" onclick="startPreview('student')">Preview as Student</button>
            </div>
          </div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" placeholder="Choose a username" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Choose a password (min 6 chars)" required minlength="6">
          </div>
          <div class="form-group">
            <label for="reg-teacher-code">Teacher Code <span class="text-muted">(leave blank if student)</span></label>
            <input type="text" id="reg-teacher-code" placeholder="Enter teacher code if you are the teacher">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
          <p class="auth-switch">Already have an account? <a href="#" onclick="toggleAuthForm(event)">Sign In</a></p>
        </form>
      </div>
    </div>
  </div>

  <!-- Main App View -->
  <div id="app-view" class="hidden">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo-sm">&lt;/&gt;</div>
        <h2>CodeTrack</h2>
      </div>
      <div class="user-badge" id="user-badge"></div>
      <ul id="nav-links"></ul>
      <button class="btn btn-logout" onclick="handleLogout()">Sign Out</button>
    </nav>

    <!-- Mobile Header -->
    <div id="mobile-header" class="hidden">
      <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
      <span>CodeTrack</span>
      <button class="btn-sm" onclick="handleLogout()">Sign Out</button>
    </div>

    <!-- Main Content -->
    <main id="main-content">
      <div id="content-area"></div>
    </main>
  </div>

  <!-- Notification Toast -->
  <div id="toast" class="hidden"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="hidden" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Firebase SDK (v9 compat for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
